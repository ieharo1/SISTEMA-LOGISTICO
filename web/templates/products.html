<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left-color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <i class="bi bi-truck text-white display-6"></i>
                    <h5 class="text-white mt-2">DispatchPro</h5>
                </div>
                <nav class="mt-3">
                    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a href="/dashboard/orders"><i class="bi bi-journal-check me-2"></i> Pedidos</a>
                    <a href="/dashboard/products" class="active"><i class="bi bi-box-seam me-2"></i> Inventario</a>
                    <a href="/dashboard/drivers"><i class="bi bi-people me-2"></i> Repartidores</a>
                    <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </nav>
            </div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-box-seam"></i> Gestión de Inventario</h2>
                    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#productModal">
                        <i class="bi bi-plus-lg"></i> Nuevo Producto
                    </button>
                </div>

                <div class="card mb-4">
                    <div class="card-header bg-warning">
                        <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Productos con Stock Bajo</h5>
                    </div>
                    <div class="card-body">
                        <div id="lowStockList" class="row"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>SKU</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Stock Mín</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="productForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">SKU</label>
                            <input type="text" class="form-control" id="productSKU" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="productDesc" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio</label>
                                <input type="number" class="form-control" id="productPrice" step="0.01" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock Inicial</label>
                                <input type="number" class="form-control" id="productStock" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock Mínimo</label>
                                <input type="number" class="form-control" id="productMinStock" value="10">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Categoría</label>
                                <input type="text" class="form-control" id="productCategory">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-danger">Crear Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadProducts() {
            const res = await fetch(API_URL + '/products', { headers });
            const products = await res.json();
            
            document.getElementById('productsTableBody').innerHTML = products.map(p => `
                <tr class="${p.stock <= p.min_stock ? 'table-warning' : ''}">
                    <td>${p.sku}</td>
                    <td>${p.name}</td>
                    <td>${p.category || '-'}</td>
                    <td>$${p.price.toLocaleString()}</td>
                    <td>${p.stock}</td>
                    <td>${p.min_stock}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="adjustStock('${p.id}')"><i class="bi bi-plus-slash-minus"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct('${p.id}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadLowStock() {
            const res = await fetch(API_URL + '/products/low-stock', { headers });
            const products = await res.json();
            document.getElementById('lowStockList').innerHTML = products.length ? products.map(p => `
                <div class="col-md-3">
                    <div class="alert alert-warning mb-0">
                        <strong>${p.name}</strong><br>
                        Stock: ${p.stock}
                    </div>
                </div>
            `).join('') : '<p class="text-muted">No hay productos con stock bajo</p>';
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const product = {
                name: document.getElementById('productName').value,
                sku: document.getElementById('productSKU').value,
                description: document.getElementById('productDesc').value,
                price: parseFloat(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                min_stock: parseInt(document.getElementById('productMinStock').value),
                category: document.getElementById('productCategory').value,
                active: true
            };
            const res = await fetch(API_URL + '/products', { method: 'POST', headers, body: JSON.stringify(product) });
            if (res.ok) {
                $('#productModal').modal('hide');
                loadProducts();
                loadLowStock();
            } else { alert('Error al crear producto'); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });
        loadProducts();
        loadLowStock();
    </script>
</body>
</html>
