<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left-color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <i class="bi bi-truck text-white display-6"></i>
                    <h5 class="text-white mt-2">DispatchPro</h5>
                </div>
                <nav class="mt-3">
                    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a href="/dashboard/orders" class="active"><i class="bi bi-journal-check me-2"></i> Pedidos</a>
                    <a href="/dashboard/products"><i class="bi bi-box-seam me-2"></i> Inventario</a>
                    <a href="/dashboard/drivers"><i class="bi bi-people me-2"></i> Repartidores</a>
                    <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </nav>
            </div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-journal-check"></i> Gestión de Pedidos</h2>
                    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#orderModal">
                        <i class="bi bi-plus-lg"></i> Nuevo Pedido
                    </button>
                </div>

                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" id="filterStatus">
                                    <option value="">Todos</option>
                                    <option value="pending">Pendiente</option>
                                    <option value="confirmed">Confirmado</option>
                                    <option value="processing">Procesando</option>
                                    <option value="shipped">Enviado</option>
                                    <option value="delivered">Entregado</option>
                                    <option value="cancelled">Cancelado</option>
                                </select>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button class="btn btn-primary w-100" onclick="loadOrders(1)">Buscar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover" id="ordersTable">
                            <thead>
                                <tr>
                                    <th>Número</th>
                                    <th>Cliente</th>
                                    <th>Email</th>
                                    <th>Teléfono</th>
                                    <th>Total</th>
                                    <th>Estado</th>
                                    <th>Fecha</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody"></tbody>
                        </table>
                    </div>
                    <div class="card-footer">
                        <nav><ul class="pagination mb-0" id="pagination"></ul></nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Pedido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="orderForm">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre Cliente</label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="customerEmail" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" class="form-control" id="customerPhone" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Dirección</label>
                                <input type="text" class="form-control" id="shippingAddr" required>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Notas</label>
                                <textarea class="form-control" id="notes" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-danger">Crear Pedido</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        let currentPage = 1;

        async function loadOrders(page = 1) {
            currentPage = page;
            const status = document.getElementById('filterStatus').value;
            let url = API_URL + `/orders?page=${page}&limit=10`;
            if (status) url += `&status=${status}`;

            const res = await fetch(url, { headers });
            const data = await res.json();
            
            document.getElementById('ordersTableBody').innerHTML = data.data.map(o => `
                <tr>
                    <td>${o.order_number}</td>
                    <td>${o.customer_name}</td>
                    <td>${o.customer_email}</td>
                    <td>${o.customer_phone}</td>
                    <td>$${o.total.toLocaleString()}</td>
                    <td><span class="badge bg-${getStatusColor(o.status)}">${o.status}</span></td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewOrder('${o.id}')"><i class="bi bi-eye"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteOrder('${o.id}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
            
            renderPagination(data.totalPage);
        }

        function getStatusColor(status) {
            const colors = { pending: 'warning', confirmed: 'info', processing: 'primary', shipped: 'secondary', delivered: 'success', cancelled: 'danger' };
            return colors[status] || 'secondary';
        }

        function renderPagination(totalPages) {
            let html = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadOrders(${currentPage - 1})">Anterior</a>
            </li>`;
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadOrders(${i})">${i}</a>
                </li>`;
            }
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadOrders(${currentPage + 1})">Siguiente</a>
            </li>`;
            document.getElementById('pagination').innerHTML = html;
        }

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const order = {
                order_number: 'ORD-' + Date.now(),
                customer_name: document.getElementById('customerName').value,
                customer_email: document.getElementById('customerEmail').value,
                customer_phone: document.getElementById('customerPhone').value,
                shipping_addr: document.getElementById('shippingAddr').value,
                notes: document.getElementById('notes').value,
                items: []
            };
            const res = await fetch(API_URL + '/orders', { method: 'POST', headers, body: JSON.stringify(order) });
            if (res.ok) {
                $('#orderModal').modal('hide');
                loadOrders();
            } else { alert('Error al crear pedido'); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });
        loadOrders();
    </script>
</body>
</html>
