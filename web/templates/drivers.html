<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left-color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <i class="bi bi-truck text-white display-6"></i>
                    <h5 class="text-white mt-2">DispatchPro</h5>
                </div>
                <nav class="mt-3">
                    <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a href="/dashboard/orders"><i class="bi bi-journal-check me-2"></i> Pedidos</a>
                    <a href="/dashboard/products"><i class="bi bi-box-seam me-2"></i> Inventario</a>
                    <a href="/dashboard/drivers" class="active"><i class="bi bi-people me-2"></i> Repartidores</a>
                    <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </nav>
            </div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-people"></i> Gestión de Repartidores</h2>
                    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#driverModal">
                        <i class="bi bi-plus-lg"></i> Nuevo Repartidor
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th>Teléfono</th>
                                    <th>Licencia</th>
                                    <th>Vehículo</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="driversTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="driverModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Repartidor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="driverForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="driverName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="driverEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" id="driverPhone" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Licencia</label>
                                <input type="text" class="form-control" id="driverLicense" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Vehículo</label>
                                <input type="text" class="form-control" id="driverVehicle" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-danger">Crear Repartidor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        async function loadDrivers() {
            const res = await fetch(API_URL + '/drivers', { headers });
            const drivers = await res.json();
            
            document.getElementById('driversTableBody').innerHTML = drivers.map(d => `
                <tr>
                    <td>${d.name}</td>
                    <td>${d.email}</td>
                    <td>${d.phone}</td>
                    <td>${d.license}</td>
                    <td>${d.vehicle}</td>
                    <td><span class="badge bg-${d.active ? 'success' : 'secondary'}">${d.active ? 'Activo' : 'Inactivo'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('driverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const driver = {
                name: document.getElementById('driverName').value,
                email: document.getElementById('driverEmail').value,
                phone: document.getElementById('driverPhone').value,
                license: document.getElementById('driverLicense').value,
                vehicle: document.getElementById('driverVehicle').value,
                active: true
            };
            const res = await fetch(API_URL + '/drivers', { method: 'POST', headers, body: JSON.stringify(driver) });
            if (res.ok) {
                $('#driverModal').modal('hide');
                loadDrivers();
            } else { alert('Error al crear repartidor'); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });
        loadDrivers();
    </script>
</body>
</html>
