<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left-color: #e74c3c; }
        .stat-card { border: none; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <i class="bi bi-truck text-white display-6"></i>
                    <h5 class="text-white mt-2">DispatchPro</h5>
                </div>
                <nav class="mt-3">
                    <a href="/dashboard" class="active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    <a href="/dashboard/orders"><i class="bi bi-journal-check me-2"></i> Pedidos</a>
                    <a href="/dashboard/products"><i class="bi bi-box-seam me-2"></i> Inventario</a>
                    <a href="/dashboard/drivers"><i class="bi bi-people me-2"></i> Repartidores</a>
                    <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Salir</a>
                </nav>
            </div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-speedometer2"></i> Dashboard</h2>
                    <div><span class="me-3" id="userName"></span><span class="badge bg-danger" id="userRole"></span></div>
                </div>

                <div class="row mb-4" id="statsCards">
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 bg-primary text-white">
                            <p class="mb-1">Total Pedidos</p>
                            <h3 id="totalOrders">0</h3>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 bg-warning text-dark">
                            <p class="mb-1">Pendientes</p>
                            <h3 id="pendingOrders">0</h3>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 bg-success text-white">
                            <p class="mb-1">Repartidores Activos</p>
                            <h3 id="activeDrivers">0</h3>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card stat-card p-3 bg-info text-white">
                            <p class="mb-1">Stock Bajo</p>
                            <h3 id="lowStock">0</h3>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-header"><h5 class="mb-0">Pedidos por Estado</h5></div>
                            <div class="card-body"><canvas id="statusChart"></canvas></div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-header"><h5 class="mb-0">Ingresos Totales</h5></div>
                            <div class="card-body">
                                <h2 class="text-success" id="totalRevenue">$0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h5 class="mb-0">Últimos Pedidos</h5></div>
                    <div class="card-body">
                        <table class="table" id="ordersTable">
                            <thead>
                                <tr>
                                    <th>Número</th>
                                    <th>Cliente</th>
                                    <th>Total</th>
                                    <th>Estado</th>
                                    <th>Fecha</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').textContent = user.name || 'Usuario';
        document.getElementById('userRole').textContent = user.role || 'user';

        async function loadStats() {
            const res = await fetch(API_URL + '/orders/stats', { headers });
            const data = await res.json();
            document.getElementById('totalOrders').textContent = data.total_orders;
            document.getElementById('pendingOrders').textContent = data.pending_orders;
            document.getElementById('activeDrivers').textContent = data.active_drivers;
            document.getElementById('lowStock').textContent = data.low_stock_items;
            document.getElementById('totalRevenue').textContent = '$' + data.total_revenue.toLocaleString();
            
            const ctx = document.getElementById('statusChart').getContext('2d');
            const labels = Object.keys(data.orders_by_status || {});
            const values = Object.values(data.orders_by_status || {});
            new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data: values, backgroundColor: ['#ffc107', '#0dcaf0', '#198754', '#dc3545', '#6c757d'] }] }
            });
        }

        async function loadRecentOrders() {
            const res = await fetch(API_URL + '/orders?page=1&limit=5', { headers });
            const data = await res.json();
            document.getElementById('ordersTableBody').innerHTML = data.data.map(o => `
                <tr>
                    <td>${o.order_number}</td>
                    <td>${o.customer_name}</td>
                    <td>$${o.total.toLocaleString()}</td>
                    <td><span class="badge bg-${getStatusColor(o.status)}">${o.status}</span></td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = { pending: 'warning', confirmed: 'info', processing: 'primary', shipped: 'secondary', delivered: 'success', cancelled: 'danger' };
            return colors[status] || 'secondary';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });
        loadStats();
        loadRecentOrders();
    </script>
</body>
</html>
